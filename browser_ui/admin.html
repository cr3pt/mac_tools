<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Noriben SOC — Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-slate-100 p-6">
  <div class="max-w-3xl mx-auto">
    <h1 class="text-2xl font-bold mb-4">Admin — Configuration</h1>
    <form id="cfg" class="space-y-3 bg-slate-800 p-4 rounded">
      <label class="block"><span class="text-sm text-slate-400">Environment</span><input class="w-full p-2 rounded bg-slate-700" name="NORIBEN_ENV"></label>
      <label class="block"><span class="text-sm text-slate-400">DATABASE_URL</span><input class="w-full p-2 rounded bg-slate-700" name="DATABASE_URL"></label>
      <label class="block"><span class="text-sm text-slate-400">CELERY_BROKER</span><input class="w-full p-2 rounded bg-slate-700" name="CELERY_BROKER"></label>
      <label class="block"><span class="text-sm text-slate-400">UPLOAD_DIR</span><input class="w-full p-2 rounded bg-slate-700" name="UPLOAD_DIR"></label>
      <label class="block"><span class="text-sm text-slate-400">LOG_LEVEL</span><input class="w-full p-2 rounded bg-slate-700" name="LOG_LEVEL"></label>
      <label class="block"><span class="text-sm text-slate-400">LOG_JSON (true/false)</span><input class="w-full p-2 rounded bg-slate-700" name="LOG_JSON"></label>
      <label class="block"><span class="text-sm text-slate-400">VIRUSTOTAL_API_KEY</span><input class="w-full p-2 rounded bg-slate-700" name="VIRUSTOTAL_API_KEY"></label>
      <label class="block"><span class="text-sm text-slate-400">OTX_API_KEY</span><input class="w-full p-2 rounded bg-slate-700" name="OTX_API_KEY"></label>
      <div class="flex gap-2">
        <button type="button" onclick="saveConfig()" class="px-4 py-2 bg-emerald-600 rounded">Save</button>
        <button type="button" onclick="setupDb()" class="px-4 py-2 bg-blue-600 rounded">Setup DB</button>
        <button id="run-btn" type="button" onclick="runSetup()" class="px-4 py-2 bg-rose-600 rounded">Run full setup script</button>
        <button id="cancel-btn" type="button" onclick="cancelTask()" class="px-4 py-2 bg-yellow-600 rounded hidden">Cancel</button>
        <button id="revoke-btn" type="button" onclick="revokeToken()" class="px-4 py-2 bg-indigo-600 rounded hidden">Revoke Token</button>
        <a id="download-link" class="px-4 py-2 bg-slate-700 rounded text-xs hidden">Download Log</a>
        <button type="button" onclick="listTasks()" class="px-4 py-2 bg-slate-600 rounded">List Tasks</button>
        <button type="button" onclick="pruneNow()" class="px-4 py-2 bg-amber-600 rounded">Prune Old Logs</button>
      </div>
    </form>

    <pre id="out" class="mt-4 p-3 bg-slate-800 rounded h-48 overflow-auto text-xs"></pre>
    <div id="tasks" class="mt-4"></div>
  </div>

<script>
async function load(){
  const r = await fetch('/admin/config');
  const j = await r.json();
  for(const k in j) if(document.querySelector('[name="'+k+'"]')) document.querySelector('[name="'+k+'"]').value = j[k] ?? '';
}

async async function listTasks(){
  const r = await fetch('/admin/run-setup/list');
  const j = await r.json();
  const container = document.getElementById('tasks');
  if(!j || !j.length){ container.innerHTML = '<div class="text-slate-500">No tasks</div>'; return; }
  let html = '<table class="w-full text-xs"><thead><tr class="text-left text-slate-400"><th>Task ID</th><th>Script</th><th>Initiator</th><th>Start</th><th>Status</th><th>Actions</th></tr></thead><tbody>';
  for(const t of j){
    html += `<tr class="border-t border-slate-800"><td class="font-mono">${t.task_id}</td><td>${t.script}</td><td>${t.initiator||'-'}</td><td>${t.start_time||'-'}</td><td>${t.status||'-'}</td><td>`;
    if(t.log_exists) html += `<a class="px-2 py-1 bg-slate-700 rounded text-xs" href="/admin/run-setup/logs/${t.task_id}">Download Log</a> `;
    html += `<button onclick="deleteTask('${t.task_id}')" class="px-2 py-1 bg-rose-700 rounded text-xs">Delete</button>`;
    html += '</td></tr>';
  }
  html += '</tbody></table>';
  html += '<div class="mt-2"><a class="px-3 py-1 bg-slate-700 rounded text-xs" href="/admin/run-setup/export">Export CSV</a></div>';
  container.innerHTML = html;
}

async function deleteTask(id){
  if(!confirm('Delete task '+id+' and its log?')) return;
  const r = await fetch(`/admin/run-setup/logs/${id}`,{method:'DELETE'});
  const j = await r.json();
  document.getElementById('out').textContent = JSON.stringify(j, null, 2);
  listTasks();
}
async function saveConfig(){
  const form = document.getElementById('cfg');
  const fd = new FormData(form);
  const obj = {};
  fd.forEach((v,k)=>obj[k]=v);
  const r = await fetch('/admin/config',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(obj)});
  const j = await r.json(); document.getElementById('out').textContent = JSON.stringify(j, null, 2);
}
async function setupDb(){
  const r = await fetch('/admin/setup-db',{method:'POST'});
  const j = await r.json(); document.getElementById('out').textContent = JSON.stringify(j, null, 2);
}
async function runSetup(){
  const runBtn = document.getElementById('run-btn');
  const cancelBtn = document.getElementById('cancel-btn');
  const dl = document.getElementById('download-link');
  runBtn.disabled = true;
  const r = await fetch('/admin/run-setup',{method:'POST'});
  const j = await r.json();
  if(!j.ok){ document.getElementById('out').textContent = JSON.stringify(j, null, 2); runBtn.disabled = false; return; }
  const task = j.task_id;
  cancelBtn.classList.remove('hidden');
  dl.classList.add('hidden');
  document.getElementById('out').textContent = 'Started task: '+task+'\nConnecting to logs...';
  // obtain short-lived token
  const rt = await fetch('/admin/token',{method:'POST'});
  const rtj = await rt.json();
  const token = rtj.token;
  // store token for revoke
  window.currentAdminToken = token;
  document.getElementById('revoke-btn').classList.remove('hidden');
  const ws = new WebSocket((location.protocol==='https:'?'wss://':'ws://')+location.host+`/admin/run-setup/ws/${task}?token=${token}`);
  ws.onmessage = (e)=>{document.getElementById('out').textContent += '\n'+e.data;};
  ws.onopen = ()=>{document.getElementById('out').textContent += '\n[ws open]';};
  ws.onclose = ()=>{document.getElementById('out').textContent += '\n[ws closed]'; cancelBtn.classList.add('hidden'); dl.classList.remove('hidden'); dl.href = `/admin/run-setup/logs/${task}`; dl.textContent = 'Download Log'; runBtn.disabled = false; document.getElementById('revoke-btn').classList.add('hidden');};
  // keep task id in button dataset
  cancelBtn.dataset.task = task;
}

async function cancelTask(){
  const cancelBtn = document.getElementById('cancel-btn');
  const task = cancelBtn.dataset.task;
  if(!task) return;
  const r = await fetch(`/admin/run-setup/cancel/${task}`,{method:'POST'});
  const j = await r.json();
  document.getElementById('out').textContent += '\nCancel result: '+JSON.stringify(j);
  cancelBtn.classList.add('hidden');
}

async function revokeToken(){
  const token = window.currentAdminToken;
  if(!token) return;
  const r = await fetch('/admin/token/revoke',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token})});
  const j = await r.json();
  document.getElementById('out').textContent += '\nRevoke result: '+JSON.stringify(j);
  document.getElementById('revoke-btn').classList.add('hidden');
  window.currentAdminToken = null;
}

async function pruneNow(){
  if(!confirm('Prune old logs and audit records now?')) return;
  const r = await fetch('/admin/run-setup/prune',{method:'POST'});
  const j = await r.json();
  document.getElementById('out').textContent += '\nPrune result: '+JSON.stringify(j);
  listTasks();
}

async function uploadYara(){
  const f = document.getElementById('yara-file').files[0];
  if(!f){ alert('Choose a file'); return; }
  const fd = new FormData(); fd.append('file', f);
  const r = await fetch('/admin/rules/yara/upload',{method:'POST', body: fd});
  const j = await r.json(); document.getElementById('out').textContent += '\nUpload YARA: '+JSON.stringify(j);
  listRules();
}
async function fetchYara(){
  const url = document.getElementById('yara-url').value;
  if(!url){ alert('Enter URL'); return; }
  const r = await fetch('/admin/rules/yara/from_url',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({url})});
  const j = await r.json(); document.getElementById('out').textContent += '\nFetch YARA: '+JSON.stringify(j);
  listRules();
}
async function uploadSigma(){
  const f = document.getElementById('sigma-file').files[0];
  if(!f){ alert('Choose a file'); return; }
  const fd = new FormData(); fd.append('file', f);
  const r = await fetch('/admin/rules/sigma/upload',{method:'POST', body: fd});
  const j = await r.json(); document.getElementById('out').textContent += '\nUpload SIGMA: '+JSON.stringify(j);
  listRules();
}
async function fetchSigma(){
  const url = document.getElementById('sigma-url').value;
  if(!url){ alert('Enter URL'); return; }
  const r = await fetch('/admin/rules/sigma/from_url',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({url})});
  const j = await r.json(); document.getElementById('out').textContent += '\nFetch SIGMA: '+JSON.stringify(j);
  listRules();
}

async function listRules(){
  const r = await fetch('/admin/rules/list');
  const j = await r.json();
  const el = document.getElementById('rules-list');
  let html = '';
  html += '<div class="grid grid-cols-2 gap-4">';
  for(const t of ['yara','sigma']){
    html += `<div><h4 class="text-slate-300">${t.toUpperCase()}</h4><ul>`;
    for(const f of j[t]){
      html += `<li class="flex gap-2 items-center"><span class="font-mono">${f.name}</span> <a class="px-2 py-1 bg-slate-700 rounded text-xs" href="/admin/rules/download/${t}/${encodeURIComponent(f.name)}">Download</a> <button onclick="deleteRule('${t}','${f.name}')" class="px-2 py-1 bg-rose-700 rounded text-xs">Delete</button></li>`;
    }
    html += '</ul></div>';
  }
  html += '</div>';
  el.innerHTML = html;
}

async function deleteRule(type,name){
  if(!confirm('Delete rule '+name+'?')) return;
  const r = await fetch(`/admin/rules/${type}/${encodeURIComponent(name)}`,{method:'DELETE'});
  const j = await r.json(); document.getElementById('out').textContent += '\nDelete rule: '+JSON.stringify(j);
  listRules();
}

load();
</script>
</body>
</html>

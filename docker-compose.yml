
version: "3.8"
services:
  postgres:
    image: postgres:15-alpine
    ports: ["5432:5432"]
    environment:
      POSTGRES_DB: noriben_soc
      POSTGRES_USER: noriben
      POSTGRES_PASSWORD: noriben
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
  app:
    build: .
    ports: ["8000:8000"]
    volumes:
      - .:/app
    depends_on:
      - postgres
      - redis

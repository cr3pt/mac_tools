version: "3.8"
services:
  postgres:
    image: postgres:15
    platform: linux/amd64
    environment:
      POSTGRES_DB: noriben
      POSTGRES_USER: noriben
      POSTGRES_PASSWORD: noriben123
    ports: ["5432:5432"]
    volumes: [noriben_pg:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD","pg_isready","-U","noriben"]
      interval: 5s

  redis:
    image: redis:7-alpine
    platform: linux/amd64
    ports: ["6379:6379"]

  api:
    build: {context: ., dockerfile: Dockerfile, platform: linux/amd64}
    ports: ["8000:8000"]
    volumes: [".:/app"]
    environment:
      DATABASE_URL: postgresql://noriben:noriben123@postgres/noriben
      CELERY_BROKER: redis://redis:6379/0
    depends_on:
      postgres: {condition: service_healthy}

  celery:
    build: {context: ., dockerfile: Dockerfile, platform: linux/amd64}
    command: celery -A noriben_soc.tasks worker --loglevel=info --concurrency=4
    volumes: [".:/app"]
    environment:
      DATABASE_URL: postgresql://noriben:noriben123@postgres/noriben
      CELERY_BROKER: redis://redis:6379/0
    depends_on: [redis, postgres]

  qemu:
    image: qemuwm/win10-noriben:latest
    platform: linux/amd64
    privileged: true
    volumes: ["./vms:/shared"]
    ports: ["5901:5900","4444:4444"]

  grafana:
    image: grafana/grafana:latest
    ports: ["3000:3000"]
    environment: {GF_SECURITY_ADMIN_PASSWORD: admin}
    volumes:
      - noriben_grafana:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning

volumes:
  noriben_pg: {}
  noriben_redis: {}
  noriben_grafana: {}
